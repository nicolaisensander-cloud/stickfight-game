<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickfight Multiplayer - Stickman</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f23;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            background-color: #1a1a2e;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 10px;
            pointer-events: none;
        }

        #health-bar-container {
            width: 200px;
            height: 20px;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 0 auto;
            position: relative;
        }

        #health-bar {
            height: 100%;
            background-color: #4CAF50;
            transition: width 0.3s ease, background-color 0.3s ease;
            width: 100%;
        }

        #health-text {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 12px;
            line-height: 20px;
            text-shadow: 1px 1px 2px black;
        }

        #controls-info {
            text-align: center;
            color: white;
            margin-top: 10px;
            font-size: 12px;
            text-shadow: 1px 1px 2px black;
        }

        #controls-info p {
            margin: 2px 0;
        }

        #block-indicator {
            color: #64c8ff;
            font-weight: bold;
            font-size: 14px;
        }

        #block-timer {
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div id="health-bar-container">
                <div id="health-bar"></div>
                <span id="health-text">100/100</span>
            </div>
            <div id="controls-info">
                <p>Piletaster/A,D: Bevægelse | Mellemrum/W: Hop | E: Angreb | Hold F: Bloker</p>
                <p id="block-indicator">Blokering klar</p>
                <p id="block-timer"></p>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const socket = io();

        // ====== LOKAL SPILLER (100% klient-side) ======
        const myPlayer = {
            id: socket.id,
            x: Math.random() * 700 + 50,
            y: 440,
            width: 30,
            height: 60,
            vx: 0,
            vy: 0,
            health: 100,
            maxHealth: 100,
            facingRight: true,
            isAttacking: false,
            isBlocking: false,
            attackCooldown: 0,
            blockTimer: 0,        // Hvor længe man har blokeret (maks 3 sek = 180 frames)
            blockCooldownTimer: 0, // Cooldown efter blokering (2 sek = 120 frames)
            color: `hsl(${Math.random() * 360}, 70%, 50%)`,
            onGround: false,
            alive: true,
            respawnTimer: 0,
            attackBox: { x: 0, y: 0, width: 50, height: 50 },
            knockbackVx: 0,
            knockbackVy: 0
        };

        // ====== ANDRE SPILLERE (fra server) ======
        let otherPlayers = {};

        // ====== KONSTANTER ======
        const GRAVITY = 0.6;
        const JUMP_FORCE = -12;
        const GROUND_Y = 500;
        const PLAYER_SPEED = 5;
        const ATTACK_DAMAGE = 10;
        const BLOCK_KNOCKBACK = 15;
        const ATTACK_COOLDOWN_TIME = 30; // frames
        const MAX_BLOCK_TIME = 180;      // 3 sekunder (60 fps * 3)
        const BLOCK_COOLDOWN_TIME = 120;  // 2 sekunder (60 fps * 2)
        const RESPAWN_TIME = 180;        // 3 sekunder

        // ====== EFFEKTER ======
        let blockEffects = [];
        let hitEffects = [];

        // ====== INPUT ======
        let keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            
            if (e.key.toLowerCase() === 'e') {
                attack();
            }
            
            e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
            
            if (e.key.toLowerCase() === 'f') {
                // Slip F = stop blokering
                if (myPlayer.isBlocking) {
                    stopBlocking();
                }
            }
        });

        function startBlocking() {
            if (!myPlayer.alive) return;
            if (myPlayer.blockCooldownTimer > 0) return;
            if (myPlayer.blockTimer >= MAX_BLOCK_TIME) return;
            
            myPlayer.isBlocking = true;
            socket.emit('blockingState', true);
        }

        function stopBlocking() {
            myPlayer.isBlocking = false;
            socket.emit('blockingState', false);
            
            // Start cooldown hvis man har blokeret
            if (myPlayer.blockTimer > 0) {
                myPlayer.blockCooldownTimer = BLOCK_COOLDOWN_TIME;
            }
            myPlayer.blockTimer = 0;
        }

        // ====== ANGREB ======
        function attack() {
            if (!myPlayer.alive) return;
            if (myPlayer.attackCooldown > 0) return;
            
            // Kan ikke angribe mens man blokerer
            if (myPlayer.isBlocking) return;
            
            myPlayer.attackCooldown = ATTACK_COOLDOWN_TIME;
            myPlayer.isAttacking = true;
            
            // Beregn attack box
            const attackRange = 50;
            myPlayer.attackBox = {
                x: myPlayer.facingRight ? myPlayer.x + myPlayer.width : myPlayer.x - attackRange,
                y: myPlayer.y + 10,
                width: attackRange,
                height: 40
            };
            
            // Send attack event til server (så andre kan se animation)
            socket.emit('attackEvent', {
                attackX: myPlayer.attackBox.x,
                attackY: myPlayer.attackBox.y,
                attackWidth: myPlayer.attackBox.width,
                attackHeight: myPlayer.attackBox.height,
                direction: myPlayer.facingRight ? 1 : -1
            });
            
            // Tjek hit på ALLE andre spillere LOKALT
            Object.keys(otherPlayers).forEach(targetId => {
                const target = otherPlayers[targetId];
                if (!target.alive) return;
                
                // Tjek kollision mellem attack box og target
                if (rectCollision(myPlayer.attackBox, {
                    x: target.x,
                    y: target.y,
                    width: target.width || 30,
                    height: target.height || 60
                })) {
                    if (target.isBlocking) {
                        // BLOKERET! Angriber bliver skubbet væk
                        const knockbackDir = myPlayer.facingRight ? -1 : 1;
                        myPlayer.knockbackVx = knockbackDir * BLOCK_KNOCKBACK;
                        myPlayer.knockbackVy = -8;
                        
                        // Blokerings effekt
                        blockEffects.push({
                            x: (myPlayer.x + target.x) / 2,
                            y: (myPlayer.y + target.y) / 2,
                            alpha: 1,
                            scale: 0
                        });
                        
                        // Fortæl serveren at target blokerede
                        socket.emit('playerHit', {
                            targetId: targetId,
                            damage: 0,
                            hitX: (myPlayer.x + target.x) / 2,
                            hitY: (myPlayer.y + target.y) / 2,
                            blocked: true
                        });
                    } else {
                        // HIT! Target tager skade
                        socket.emit('playerHit', {
                            targetId: targetId,
                            damage: ATTACK_DAMAGE,
                            hitX: target.x + 15,
                            hitY: target.y,
                            blocked: false
                        });
                        
                        // Vis skade lokalt
                        hitEffects.push({
                            x: target.x + 15,
                            y: target.y,
                            alpha: 1,
                            text: `-${ATTACK_DAMAGE}`
                        });
                    }
                }
            });
            
            // Reset attack efter kort tid
            setTimeout(() => {
                myPlayer.isAttacking = false;
            }, 200);
        }

        function rectCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // ====== SOCKET EVENTS (modtag fra server) ======
        socket.on('existingPlayers', (players) => {
            otherPlayers = players;
        });

        socket.on('newPlayer', (player) => {
            otherPlayers[player.id] = player;
        });

        socket.on('playerUpdate', (player) => {
            if (otherPlayers[player.id]) {
                otherPlayers[player.id] = {
                    ...otherPlayers[player.id],
                    x: player.x,
                    y: player.y,
                    facingRight: player.facingRight,
                    isAttacking: player.isAttacking,
                    isBlocking: player.isBlocking,
                    health: player.health,
                    alive: player.alive
                };
            }
        });

        socket.on('playerBlocking', (data) => {
            if (otherPlayers[data.playerId]) {
                otherPlayers[data.playerId].isBlocking = data.isBlocking;
            }
        });

        socket.on('playerWasHit', (data) => {
            if (data.blocked) {
                blockEffects.push({
                    x: data.hitX,
                    y: data.hitY,
                    alpha: 1,
                    scale: 0
                });
            } else {
                hitEffects.push({
                    x: data.hitX,
                    y: data.hitY,
                    alpha: 1,
                    text: `-${data.damage}`
                });
                
                if (otherPlayers[data.targetId]) {
                    otherPlayers[data.targetId].health -= data.damage;
                    if (otherPlayers[data.targetId].health <= 0) {
                        otherPlayers[data.targetId].alive = false;
                        otherPlayers[data.targetId].health = 0;
                    }
                }
                
                if (data.targetId === myPlayer.id) {
                    myPlayer.health -= data.damage;
                    if (myPlayer.health <= 0) {
                        myPlayer.alive = false;
                        myPlayer.health = 0;
                        myPlayer.respawnTimer = RESPAWN_TIME;
                        socket.emit('playerDeath', { killerId: data.attackerId });
                    }
                }
            }
        });

        socket.on('playerDied', (data) => {
            if (otherPlayers[data.playerId]) {
                otherPlayers[data.playerId].alive = false;
                otherPlayers[data.playerId].health = 0;
            }
        });

        socket.on('playerRespawned', (player) => {
            if (otherPlayers[player.id]) {
                otherPlayers[player.id] = {
                    ...otherPlayers[player.id],
                    x: player.x,
                    y: player.y,
                    health: 100,
                    alive: true
                };
            }
        });

        socket.on('playerDisconnected', (playerId) => {
            delete otherPlayers[playerId];
        });

        // ====== SPIL LOOP ======
        function update() {
            if (myPlayer.alive) {
                // === HÅNDTER INPUT (lokalt) ===
                if (keys['arrowleft'] || keys['a']) {
                    myPlayer.vx = -PLAYER_SPEED;
                    myPlayer.facingRight = false;
                } else if (keys['arrowright'] || keys['d']) {
                    myPlayer.vx = PLAYER_SPEED;
                    myPlayer.facingRight = true;
                } else {
                    myPlayer.vx = 0;
                }
                
                if ((keys[' '] || keys['arrowup'] || keys['w']) && myPlayer.onGround) {
                    myPlayer.vy = JUMP_FORCE;
                    myPlayer.onGround = false;
                }
                
                // === BLOKERING (hold F) ===
                if (keys['f']) {
                    if (myPlayer.blockCooldownTimer <= 0) {
                        // Kan blokere - start blokering
                        if (!myPlayer.isBlocking && myPlayer.blockTimer < MAX_BLOCK_TIME) {
                            startBlocking();
                        }
                    }
                } else {
                    // F er ikke holdt nede - stop blokering
                    if (myPlayer.isBlocking) {
                        stopBlocking();
                    }
                }
                
                // === OPDATER BLOKERING ===
                if (myPlayer.isBlocking) {
                    myPlayer.blockTimer++;
                    
                    // Opdater blokerings-timer UI
                    const remainingBlock = Math.max(0, Math.ceil((MAX_BLOCK_TIME - myPlayer.blockTimer) / 60));
                    document.getElementById('block-timer').textContent = 
                        `Blokering: ${remainingBlock}s tilbage`;
                    
                    // Maks blokeringstid nået - tvungen stop
                    if (myPlayer.blockTimer >= MAX_BLOCK_TIME) {
                        stopBlocking();
                        document.getElementById('block-timer').textContent = '';
                        document.getElementById('block-indicator').textContent = 'Blokering opbrugt! Cooldown...';
                    }
                }
                
                // === BLOKERING COOLDOWN ===
                if (myPlayer.blockCooldownTimer > 0) {
                    myPlayer.blockCooldownTimer--;
                    
                    const cooldownRemaining = Math.ceil(myPlayer.blockCooldownTimer / 60);
                    document.getElementById('block-indicator').textContent = 
                        `Blokering cooldown: ${cooldownRemaining}s`;
                    document.getElementById('block-timer').textContent = '';
                    
                    if (myPlayer.blockCooldownTimer <= 0) {
                        document.getElementById('block-indicator').textContent = 'Blokering klar';
                        document.getElementById('block-timer').textContent = '';
                    }
                }
                
                // === FYSIK (lokalt) ===
                myPlayer.vy += GRAVITY;
                
                myPlayer.vx += myPlayer.knockbackVx;
                myPlayer.vy += myPlayer.knockbackVy;
                myPlayer.knockbackVx *= 0.8;
                myPlayer.knockbackVy *= 0.8;
                
                myPlayer.x += myPlayer.vx;
                myPlayer.y += myPlayer.vy;
                
                if (myPlayer.y >= GROUND_Y - myPlayer.height) {
                    myPlayer.y = GROUND_Y - myPlayer.height;
                    myPlayer.vy = 0;
                    myPlayer.onGround = true;
                }
                
                if (myPlayer.x < 0) {
                    myPlayer.x = 0;
                    myPlayer.vx = 0;
                }
                if (myPlayer.x > 800 - myPlayer.width) {
                    myPlayer.x = 800 - myPlayer.width;
                    myPlayer.vx = 0;
                }
                
                if (myPlayer.onGround) {
                    myPlayer.vx *= 0.9;
                }
                
                if (myPlayer.attackCooldown > 0) myPlayer.attackCooldown--;
                
                // Send position til server
                socket.emit('updatePosition', {
                    x: myPlayer.x,
                    y: myPlayer.y,
                    facingRight: myPlayer.facingRight,
                    isAttacking: myPlayer.isAttacking,
                    isBlocking: myPlayer.isBlocking,
                    health: myPlayer.health,
                    alive: myPlayer.alive
                });
                
                // Opdater UI
                const healthPercent = (myPlayer.health / myPlayer.maxHealth) * 100;
                document.getElementById('health-bar').style.width = healthPercent + '%';
                document.getElementById('health-text').textContent = `${Math.max(0, myPlayer.health)}/${myPlayer.maxHealth}`;
                
                const healthBar = document.getElementById('health-bar');
                if (healthPercent > 60) healthBar.style.backgroundColor = '#4CAF50';
                else if (healthPercent > 30) healthBar.style.backgroundColor = '#FFA500';
                else healthBar.style.backgroundColor = '#FF0000';
            } else {
                // Død - respawn timer
                myPlayer.respawnTimer--;
                
                const respawnRemaining = Math.ceil(myPlayer.respawnTimer / 60);
                document.getElementById('block-indicator').textContent = `Respawn om: ${respawnRemaining}s`;
                document.getElementById('block-timer').textContent = '';
                
                if (myPlayer.respawnTimer <= 0) {
                    myPlayer.alive = true;
                    myPlayer.health = myPlayer.maxHealth;
                    myPlayer.x = Math.random() * 700 + 50;
                    myPlayer.y = GROUND_Y - myPlayer.height;
                    myPlayer.vx = 0;
                    myPlayer.vy = 0;
                    myPlayer.knockbackVx = 0;
                    myPlayer.knockbackVy = 0;
                    myPlayer.blockTimer = 0;
                    myPlayer.blockCooldownTimer = 0;
                    myPlayer.isBlocking = false;
                    
                    document.getElementById('block-indicator').textContent = 'Blokering klar';
                    
                    socket.emit('playerRespawn', {
                        x: myPlayer.x,
                        y: myPlayer.y
                    });
                }
            }
            
            // Opdater effekter
            blockEffects = blockEffects.filter(effect => {
                effect.alpha -= 0.05;
                effect.scale += 2;
                return effect.alpha > 0;
            });
            
            hitEffects = hitEffects.filter(effect => {
                effect.alpha -= 0.03;
                effect.y -= 2;
                return effect.alpha > 0;
            });
        }

        function render() {
            // Baggrund
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Jord
            ctx.fillStyle = '#2d2d44';
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
            ctx.strokeStyle = '#4a4a6a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            ctx.lineTo(canvas.width, GROUND_Y);
            ctx.stroke();
            
            // === TEGN ALLE ANDRE SPILLERE ===
            Object.values(otherPlayers).forEach(player => {
                if (!player.alive) return;
                drawStickman(player.x, player.y, player.facingRight, player.isAttacking, 
                            player.isBlocking, player.color, player.id.substring(0, 4), player.health);
            });
            
            // === TEGN DIG SELV (altid øverst) ===
            if (myPlayer.alive) {
                drawStickman(myPlayer.x, myPlayer.y, myPlayer.facingRight, myPlayer.isAttacking,
                            myPlayer.isBlocking, myPlayer.color, 'DIG', myPlayer.health);
            } else {
                // Vis respawn timer
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`💀 DU DØDE 💀`, 400, 280);
                ctx.font = 'bold 20px Arial';
                ctx.fillText(`Respawn om ${Math.ceil(myPlayer.respawnTimer / 60)}s...`, 400, 320);
            }
            
            // === TEGN EFFEKTER ===
            blockEffects.forEach(effect => {
                ctx.strokeStyle = `rgba(255, 255, 255, ${effect.alpha})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(effect.x, effect.y, effect.scale, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.fillStyle = `rgba(100, 200, 255, ${effect.alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(effect.x, effect.y, effect.scale * 0.7, 0, Math.PI * 2);
                ctx.fill();
            });
            
            hitEffects.forEach(effect => {
                ctx.fillStyle = `rgba(255, 100, 100, ${effect.alpha})`;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(effect.text, effect.x, effect.y);
            });
            
            // Spiller antal
            const aliveCount = Object.values(otherPlayers).filter(p => p.alive).length + (myPlayer.alive ? 1 : 0);
            ctx.fillStyle = 'white';
            ctx.font = '14px Arial';
            ctx.textAlign = 'right';
            ctx.fillText(`Spillere: ${aliveCount}`, canvas.width - 10, 20);
        }

        function drawStickman(x, y, facingRight, isAttacking, isBlocking, color, name, health) {
            ctx.save();
            
            // Vend stickman hvis nødvendigt
            if (!facingRight) {
                ctx.translate(x + 15, 0);
                ctx.scale(-1, 1);
                ctx.translate(-(x + 15), 0);
            }
            
            const headX = x + 15;
            const headY = y;
            const bodyStartY = y + 20;
            const bodyEndY = y + 55;
            const armY = y + 30;
            const legStartY = y + 55;
            const legEndY = y + 75;
            
            // === STICKMAN KROP ===
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            
            // Hoved (cirkel)
            ctx.beginPath();
            ctx.arc(headX, headY + 10, 10, 0, Math.PI * 2);
            ctx.stroke();
            
            // Øjne
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(headX + 4, headY + 8, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(headX + 5, headY + 8, 1.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Krop (lodret streg)
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(headX, bodyStartY);
            ctx.lineTo(headX, bodyEndY);
            ctx.stroke();
            
            // Venstre arm
            ctx.beginPath();
            ctx.moveTo(headX, armY);
            ctx.lineTo(headX - 12, armY + 10);
            ctx.stroke();
            
            // Højre arm (angrebsarm)
            ctx.beginPath();
            ctx.moveTo(headX, armY);
            if (isAttacking) {
                ctx.lineTo(headX + 25, armY - 10);
            } else {
                ctx.lineTo(headX + 12, armY + 10);
            }
            ctx.stroke();
            
            // Venstre ben
            ctx.beginPath();
            ctx.moveTo(headX, legStartY);
            ctx.lineTo(headX - 8, legEndY);
            ctx.stroke();
            
            // Højre ben
            ctx.beginPath();
            ctx.moveTo(headX, legStartY);
            ctx.lineTo(headX + 8, legEndY);
            ctx.stroke();
            
            // Knytnæve ved angreb
            if (isAttacking) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(headX + 25, armY - 10, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
            
            // === BLOKERINGS-SKJOLD (uden for save/restore så det ikke spejlvendes) ===
            if (isBlocking) {
                // Ydre glød
                ctx.strokeStyle = 'rgba(100, 200, 255, 0.4)';
                ctx.lineWidth = 10;
                ctx.beginPath();
                ctx.arc(x + 15, y + 35, 30, 0, Math.PI * 2);
                ctx.stroke();
                
                // Indre skjold
                ctx.strokeStyle = 'rgba(100, 200, 255, 0.9)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(x + 15, y + 35, 30, 0, Math.PI * 2);
                ctx.stroke();
                
                // Skjold ikon
                ctx.fillStyle = 'rgba(100, 200, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(x + 15, y + 35, 20, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // === NAVN ===
            ctx.fillStyle = 'white';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(name, x + 15, y - 10);
            
            // === LIVSBAR ===
            if (health < 100) {
                const barWidth = 40;
                const barHeight = 4;
                const barX = x - 5;
                const barY = y - 18;
                
                ctx.fillStyle = '#333';
                ctx.fillRect(barX, barY, barWidth, barHeight);
                
                const healthColor = health > 60 ? '#4CAF50' : health > 30 ? '#FFA500' : '#FF0000';
                ctx.fillStyle = healthColor;
                ctx.fillRect(barX, barY, barWidth * (health / 100), barHeight);
            }
        }

        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        // Start spillet!
        gameLoop();
        console.log('🥊 Stickfight klar! Hold F for at blokere (maks 3 sek, 2 sek cooldown)');
    </script>
</body>
</html>
